# Nginx HTTPS 服务器配置示例
# 配合 04-03-配置HTTPS服务器.md 使用
#
# 前置要求：先生成自签名证书
#   cd examples/04-02 && bash generate-cert.sh
#   然后把 server.crt 和 server.key 复制到 examples/04-03/

server {
    # ---- 监听端口 ----
    # ssl 参数表示这个 server 块使用 SSL/TLS
    listen       443 ssl;
    server_name  example.test;

    # ---- 证书配置 ----
    ssl_certificate      certs/server.crt;       # 证书文件路径
    ssl_certificate_key  certs/server.key;       # 私钥文件路径

    # ---- SSL 协议版本控制 ----
    # 只开启 TLSv1.2 和 TLSv1.3（现代浏览器都支持）
    # 禁用 SSLv2、SSLv3、TLSv1、TLSv1.1（这些版本有已知漏洞）
    ssl_protocols         TLSv1.2 TLSv1.3;

    # ---- 加密套件 ----
    # 指定服务器支持的加密算法组合
    # 前面带 ! 的表示明确禁用
    ssl_ciphers           ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers on;   # 优先使用服务器指定的加密套件，而不是浏览器的

    # ---- 性能优化 ----
    ssl_session_cache     shared:SSL:10m;        # 缓存 SSL 会话参数，10MB 内存
    ssl_session_timeout   10m;                   # 会话缓存有效期 10 分钟

    # ---- 网站根目录 ----
    root   /usr/share/nginx/html;
    index  index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }
}

# ==========================================
# 静态文件服务器配置示例
# 将本文件 include 到主 nginx.conf 中使用
# ==========================================

server {
    # 监听 80 端口
    listen 80;
    # 域名（本地测试用 localhost）
    server_name blog.local;

    # 网站根目录（请修改为你的实际路径）
    root html/site;
    # 默认首页
    index index.html;

    # ---------- 主站路由 ----------
    # try_files: 按顺序查找文件，都找不到返回 404
    location / {
        try_files $uri $uri/ =404;
    }

    # ---------- 图片文件 ----------
    # 给图片设置缓存头，浏览器可缓存 30 天
    location /images/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ---------- CSS 和 JS 文件 ----------
    # 用正则匹配 .css 和 .js 结尾的请求
    # ~* 表示不区分大小写的正则匹配
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ---------- 别名示例 ----------
    # 访问 /static/xxx 实际读取 html/assets/xxx
    # alias 替换了 location 中匹配的 /static/ 部分
    location /static/ {
        alias html/assets/;
    }

    # ---------- 自定义 404 页面 ----------
    error_page 404 /404.html;
    location = /404.html {
        root html;
    }

    # ---------- 自定义 500 系列错误页面 ----------
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root html;
    }
}

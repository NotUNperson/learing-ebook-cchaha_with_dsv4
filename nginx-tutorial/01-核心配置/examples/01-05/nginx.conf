# ==========================================
# 错误页面与访问日志配置示例
# ==========================================

# ---------- 全局日志设置 ----------
# 这些通常在 nginx.conf 的 http 块中配置
# 这里写在一个地方方便参考

http {
    # 自定义日志格式：加入请求处理时间
    log_format detailed '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time s';

    # 默认访问日志使用 detailed 格式
    access_log logs/access.log detailed;

    # 错误日志级别设为 warn
    error_log logs/error.log warn;

    server {
        listen 80;
        server_name localhost;

        # 网站根目录
        root html;
        index index.html;

        # ---------- 主路由 ----------
        location / {
            try_files $uri $uri/ =404;
        }

        # ---------- API 接口（单独记录日志）----------
        location /api/ {
            # 这个 location 使用独立的日志文件
            access_log logs/api_access.log detailed;
            proxy_pass http://backend;
        }

        # ---------- 健康检查（不记日志）----------
        location /health {
            access_log off;
            return 200 "OK\n";
        }

        # ---------- 自定义 404 页面 ----------
        # error_page 可以放在 server 块中，所有 location 共用
        error_page 404 /404.html;

        # 404 错误页面的 location（精确匹配）
        location = /404.html {
            # 404.html 在 html 目录下
            # root 继承自 server 块的 root html
        }

        # ---------- 自定义 500 系列错误页面 ----------
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            # 50x 错误页面
        }

        # ---------- 403 禁止访问 ----------
        error_page 403 /403.html;
        location = /403.html {
        }
    }
}

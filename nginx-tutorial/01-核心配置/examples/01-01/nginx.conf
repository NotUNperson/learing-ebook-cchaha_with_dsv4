# ==========================================
# Nginx 最小配置文件（带中文注释）
# 这是学习用的精简版，展示核心结构
# ==========================================

# ---------- 全局上下文（main）----------
# worker 进程数量：auto = 自动匹配 CPU 核心数
worker_processes  auto;

# 错误日志路径和级别（debug/info/notice/warn/error/crit）
error_log  logs/error.log  warn;

# master 进程的 PID 文件位置
pid  logs/nginx.pid;

# ---------- events 上下文 ----------
# 定义 Nginx 如何处理网络连接
events {
    # 每个 worker 进程能同时处理的最大连接数
    worker_connections  1024;
}

# ---------- http 上下文 ----------
# 所有 Web 相关的配置都在这里
http {
    # 引入 MIME 类型定义文件（让浏览器知道返回的文件是什么类型）
    include       mime.types;
    # 如果文件类型未识别，默认当作二进制流处理
    default_type  application/octet-stream;

    # 定义访问日志的格式（可以自定义多个格式，给不同站点用）
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    # 访问日志的文件路径和使用的格式
    access_log  logs/access.log  main;

    # 启用高效的文件传输模式（sendfile 系统调用）
    sendfile        on;
    # 保持连接的超时时间（秒）
    keepalive_timeout  65;

    # ---------- server 上下文 ----------
    # 定义一个虚拟主机（网站）
    server {
        # 监听 80 端口（HTTP 默认端口）
        listen       80;
        # 匹配的域名（localhost 表示本机访问）
        server_name  localhost;

        # ---------- location 上下文 ----------
        # 匹配路径 "/"，即网站根路径
        location / {
            # 网站文件的根目录
            root   html;
            # 默认首页文件名（按顺序查找）
            index  index.html index.htm;
        }

        # 自定义错误页面：当发生 500/502/503/504 错误时
        # 显示这个页面而不是浏览器默认的错误页
        error_page   500 502 503 504  /50x.html;
        # 50x.html 文件的位置
        location = /50x.html {
            root   html;
        }
    }
}

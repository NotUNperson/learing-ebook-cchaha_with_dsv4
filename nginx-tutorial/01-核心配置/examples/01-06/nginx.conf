# ==========================================
# 综合练习：多站点静态服务器
# 测试前请在 hosts 文件中添加：
#   127.0.0.1  portfolio.local
#   127.0.0.1  docs.local
# ==========================================

# ---------- 作品集网站 ----------
server {
    listen 80;
    server_name portfolio.local;

    # 网站根目录（请修改为实际路径）
    root html/site-a;
    index index.html;

    # 主路由
    location / {
        try_files $uri $uri/ =404;
    }

    # 项目展示页
    location = /projects.html {
        # root 继承父级 server 的配置
    }

    # 图片目录（设置长期缓存）
    location /images/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 自定义 404 页面
    error_page 404 /404.html;
    location = /404.html {
        root html;   # 注意：404.html 在 html 目录下，不在 site-a 下
    }
}

# ---------- 技术文档站 ----------
server {
    listen 80;
    server_name docs.local;

    # 网站根目录（请修改为实际路径）
    root html/site-b;
    index index.html;

    # 主路由
    location / {
        try_files $uri $uri/ =404;
    }

    # CSS 和 JS 缓存
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # 共享 404 页面
    error_page 404 /404.html;
    location = /404.html {
        root html;
    }
}

# ---------- 默认服务器：拦截非域名的请求 ----------
server {
    listen 80 default_server;
    server_name _;
    return 444;  # 直接关闭连接，不返回任何内容
}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张晓明的作品集</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            color: #333;
            background: #f8f9fa;
        }
        header {
            text-align: center;
            padding: 40px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        header h1 { font-size: 32px; margin-bottom: 8px; }
        header p { font-size: 16px; opacity: 0.9; }
        .section { background: white; padding: 24px; margin: 20px 0; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .section h2 { color: #764ba2; margin-bottom: 12px; font-size: 20px; }
        .skill-tags { margin-top: 12px; }
        .skill-tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 14px;
            border-radius: 20px;
            margin: 4px;
            font-size: 13px;
        }
        nav { text-align: center; margin: 20px 0; }
        nav a {
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            padding: 8px 20px;
            background: #eef0ff;
            border-radius: 6px;
            transition: background 0.3s;
        }
        nav a:hover { background: #dde0ff; }
    </style>
</head>
<body>
    <header>
        <h1>张晓明</h1>
        <p>前端工程师 / 3 年经验 / 热爱开源</p>
    </header>

    <div class="section">
        <h2>关于我</h2>
        <p>你好！我是一名专注于 Web 前端开发的工程师。日常工作涉及 Vue.js、React 以及构建工具链。最近正在深入学习 Nginx 和服务端部署，希望成为一名全栈工程师。</p>
    </div>

    <div class="section">
        <h2>技能栈</h2>
        <div class="skill-tags">
            <span class="skill-tag">HTML5</span>
            <span class="skill-tag">CSS3</span>
            <span class="skill-tag">JavaScript</span>
            <span class="skill-tag">TypeScript</span>
            <span class="skill-tag">Vue.js</span>
            <span class="skill-tag">React</span>
            <span class="skill-tag">Node.js</span>
            <span class="skill-tag">Nginx</span>
            <span class="skill-tag">Docker</span>
            <span class="skill-tag">Git</span>
        </div>
    </div>

    <nav>
        <a href="/projects.html">查看我的项目</a>
    </nav>
</body>
</html>

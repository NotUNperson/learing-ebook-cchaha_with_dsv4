# ==========================================
# 虚拟主机配置示例
# 一台服务器托管两个网站
# 测试前请修改 hosts 文件：
#   127.0.0.1  www.mycompany.com
#   127.0.0.1  blog.myblog.com
# ==========================================

# ---------- 网站 A：公司官网 ----------
server {
    listen 80;
    server_name www.mycompany.com;

    # 网站文件根目录（请根据实际路径修改）
    root html/site-a;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

# ---------- 网站 B：个人博客 ----------
server {
    listen 80;
    server_name blog.myblog.com;

    # 网站文件根目录（请根据实际路径修改）
    root html/site-b;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

# ---------- 默认服务器：拦截未知域名的请求 ----------
# default_server 标记表示：当请求的域名和上面所有
# server_name 都不匹配时，使用这个 server 处理
server {
    listen 80 default_server;
    server_name _;

    # return 444：Nginx 特有状态码，直接关闭连接
    # 浏览器会看到"无法访问"的提示
    return 444;
}

# ==========================================
# location 匹配规则演示配置
# 用于测试不同的 location 匹配方式
# 使用 return 指令直接返回文本，方便验证
# ==========================================

server {
    listen 80;
    server_name location-test.local;

    # ---------- 1. 精确匹配（=）----------
    # 只有访问 /exact 且仅 /exact 时才匹配
    location = /exact {
        return 200 "精确匹配：location = /exact\n";
    }

    # 精确匹配首页（高频请求，避免正则扫描）
    location = / {
        return 200 "精确匹配：首页 location = /\n";
    }

    # ---------- 2. 优先前缀匹配（^~）----------
    # 匹配 /images/ 开头的请求，且阻止正则匹配
    location ^~ /images/ {
        return 200 "优先前缀匹配：location ^~ /images/\n";
    }

    # ---------- 3. 正则匹配（~ 区分大小写）----------
    # 匹配 .html 结尾的文件（小写）
    location ~ \.html$ {
        return 200 "正则匹配（区分大小写）：location ~ \\.html\$\n";
    }

    # ---------- 4. 正则匹配（~* 不区分大小写）----------
    # 匹配 .jpg 或 .png 结尾（不区分大小写）
    location ~* \.(jpg|png)$ {
        return 200 "正则匹配（不区分大小写）：location ~* \\.(jpg|png)\$\n";
    }

    # ---------- 5. 普通前缀匹配（无修饰符）----------
    # 匹配 /api/ 开头的请求，最低优先级
    location /api/ {
        return 200 "普通前缀匹配：location /api/\n";
    }

    # ---------- 6. 测试冲突：普通前缀 vs 正则 ----------
    # 注意：下面两个 location 都会匹配 /conflict/
    # 结果是正则优先，除非前缀加 ^~

    location /conflict/ {
        return 200 "普通前缀：location /conflict/ 匹配了\n";
    }

    location ~ /conflict/ {
        return 200 "正则匹配：location ~ /conflict/ 匹配了——\n\033记：正则优先级 > 普通前缀\n";
    }

    # ---------- 7. 兜底：匹配所有请求 ----------
    # 这是最短的前缀匹配（/），所有请求都能匹配
    # 但只在没有更长的前缀匹配且没有正则命中时才会使用
    location / {
        return 200 "兜底匹配：location / —— 没有其他规则匹配时走到这里\n";
    }
}

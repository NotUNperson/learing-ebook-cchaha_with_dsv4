# ==========================================
# 健康检查配置示例
# 演示 max_fails + fail_timeout 被动健康检查
# ==========================================

# ---------- 后端服务器组（带健康检查参数）----------
upstream backend_with_healthcheck {
    # 三台主服务器：max_fails=2, fail_timeout=15s
    # 在 15 秒内失败 2 次即标记为不可用，冷却 15 秒后重试
    server localhost:3001 max_fails=2 fail_timeout=15s;
    server localhost:3002 max_fails=2 fail_timeout=15s;
    server localhost:3003 max_fails=2 fail_timeout=15s;

    # 备用服务器：主服务器全挂时启用
    # 备用服务器也设了健康检查，避免坏服务器被启用
    server localhost:3004 backup max_fails=1 fail_timeout=10s;
}

server {
    listen 80;
    server_name api.local;

    location / {
        proxy_pass http://backend_with_healthcheck;

        # 请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        # 短超时，方便观察健康检查行为
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;

        # 失败时自动重试下一个后端
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }
}

# 测试方法：
# 1. 启动 4 个后端：
#    node server.js 3001 &
#    node server.js 3002 &
#    node server.js 3003 &
#    node server.js 3004 &
# 2. 重载 nginx：nginx -s reload
# 3. 连续发请求观察轮询：
#    for i in {1..12}; do curl -s http://api.local/ | grep port; done
# 4. 停掉一个后端，观察行为：
#    kill <3002的PID>
#    for i in {1..12}; do curl -s http://api.local/ | grep port; done
#    预期：前几个请求可能有失败，后面全部打到 3001 和 3003
# 5. 过 15 秒冷却期后重启 3002，观察是否恢复
# 6. 停掉所有 3 个主后端，观察 backup 是否启用

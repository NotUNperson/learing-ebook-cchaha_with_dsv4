# ==========================================
# 会话保持配置示例（ip_hash）
# 演示同一 IP 始终访问同一后端的行为
# ==========================================

# ---------- 使用 IP 哈希的后端组 ----------
upstream backend_ip_hash {
    ip_hash;  # 启用 IP 哈希（会话保持）

    server localhost:3001;
    server localhost:3002;
    server localhost:3003;

    # 注意：ip_hash 模式下，如果某台后端需要临时下线维护，
    # 应该标记为 down 而不是直接删除，否则哈希分布会重新计算
    # server localhost:3004 down;
}

# ---------- 对比：普通轮询（无会话保持）----------
upstream backend_round_robin {
    server localhost:3001;
    server localhost:3002;
    server localhost:3003;
}

# ---------- 使用 ip_hash 的站点 ----------
server {
    listen 80;
    server_name api-sticky.local;

    location / {
        proxy_pass http://backend_ip_hash;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }
}

# ---------- 使用轮询的站点（对比用）----------
server {
    listen 80;
    server_name api-round.local;

    location / {
        proxy_pass http://backend_round_robin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }
}

# 测试方法：
# 1. 启动 3 个后端：分别在 3001/3002/3003 端口
# 2. 修改 hosts：127.0.0.1 api-sticky.local api-round.local
# 3. 测试 ip_hash：
#    for i in {1..10}; do curl -s http://api-sticky.local/ | grep port; done
#    预期：所有请求打到同一个端口
# 4. 测试轮询：
#    for i in {1..10}; do curl -s http://api-round.local/ | grep port; done
#    预期：3 个端口轮流出现

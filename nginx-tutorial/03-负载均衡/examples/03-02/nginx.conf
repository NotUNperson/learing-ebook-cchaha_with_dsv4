# ==========================================
# upstream 负载均衡配置示例
# 演示轮询、加权轮询和故障参数
# ==========================================

# ---------- 定义后端服务器组 ----------
upstream app_backend {
    # 默认使用轮询算法（每个请求轮流分配）

    # 三台后端服务器，不同权重
    server localhost:3001 weight=3 max_fails=2 fail_timeout=30s;
    server localhost:3002 weight=2 max_fails=2 fail_timeout=30s;
    server localhost:3003 weight=1 max_fails=2 fail_timeout=30s;

    # 备用服务器（主服务器全部不可用时才启用）
    # server localhost:3004 backup;
}

server {
    listen 80;
    server_name api.local;

    # ---------- 负载均衡代理 ----------
    location / {
        # 引用 upstream 组名
        proxy_pass http://app_backend;

        # 请求头传递
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # 超时设置
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;

        # 失败重试（一个后端失败，自动尝试下一个）
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
    }
}

# 测试方法：
# 1. 启动 3 个后端进程（在 3001/3002/3003 端口）：
#    node server.js 3001 &
#    node server.js 3002 &
#    node server.js 3003 &
# 2. 重载 nginx：nginx -s reload
# 3. 连续发送请求，观察负载分配：
#    for i in {1..12}; do curl -s http://api.local/; echo "---"; done
# 4. 观察权重效果：3001 端口应该返回约 6 次（3/6=50%），
#    3002 约 4 次（2/6=33%），3003 约 2 次（1/6=17%）

# ==========================================
# 综合练习：负载均衡集群
# 外卖平台 API 服务 - 加权轮询 + 健康检查 + 故障转移
# 测试前请修改 hosts：127.0.0.1 delivery.local
# ==========================================

# ---------- 外卖平台后端组 ----------
upstream delivery_backend {
    # 加权轮询（默认，无需指定算法）
    # 总权重 = 5 + 3 + 2 = 10

    # Server A：高性能服务器，承担 50% 流量
    server localhost:3001 weight=5 max_fails=2 fail_timeout=20s;

    # Server B：标准服务器，承担 30% 流量
    server localhost:3002 weight=3 max_fails=2 fail_timeout=20s;

    # Server C：老旧服务器，承担 20% 流量
    server localhost:3003 weight=2 max_fails=2 fail_timeout=20s;

    # Server D：备用服务器，主服务器全挂时启用
    server localhost:3004 backup max_fails=1 fail_timeout=10s;
}

# ---------- 外卖平台站点 ----------
server {
    listen 80;
    server_name delivery.local;

    # ---------- API 代理 ----------
    location / {
        proxy_pass http://delivery_backend;

        # 请求头传递
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # 超时设置（较短的超时，方便演示故障转移）
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;

        # 失败重试：自动切换到下一个健康的后端
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # ---------- 健康检查接口（后端自检）----------
    # 这个接口本身不需要代理，Nginx 返回 OK 表示自己正常
    location = /nginx-health {
        access_log off;
        return 200 "Nginx OK\n";
    }
}

# 测试步骤：
# 1. 启动 4 个后端：
#    node server.js 3001 &
#    node server.js 3002 &
#    node server.js 3003 &
#    node server.js 3004 &
#
# 2. 修改 hosts：127.0.0.1 delivery.local
#
# 3. 重载 nginx：nginx -s reload
#
# 4. 测试正常负载分配（30次请求，统计各端口出现次数）：
#    for i in $(seq 1 30); do
#      curl -s http://delivery.local/ | grep '"port"'
#    done
#    预期比例：3001(50%), 3002(30%), 3003(20%)
#
# 5. 模拟故障（杀掉 3003）：
#    kill <3003的PID>
#    for i in $(seq 1 10); do
#      curl -s http://delivery.local/ | grep '"port"'
#    done
#    预期：3003 不再出现，流量分给 3001 和 3002
#
# 6. 模拟全故障（杀掉 3001 和 3002）：
#    kill <3001的PID> <3002的PID>
#    curl -s http://delivery.local/ | grep '"port"'
#    预期：所有请求打到 3004（备用服务器）
#
# 7. 恢复服务（重启所有后端）：
#    node server.js 3001 &
#    node server.js 3002 &
#    node server.js 3003 &
#    等待 20 秒后再次测试，观察 Nginx 自动恢复

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个 Nginx 静态网站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 50px;
            text-align: center;
        }
        h1 { color: #333; font-size: 2.4em; margin-bottom: 10px; }
        .subtitle { color: #888; font-size: 1.1em; margin-bottom: 40px; }
        .feature-list { text-align: left; margin: 0 auto; max-width: 400px; }
        .feature-item {
            padding: 12px 20px;
            margin: 8px 0;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            font-size: 1.05em;
            color: #444;
        }
        .status { margin-top: 30px; padding: 15px; background: #e8f5e9; border-radius: 8px; color: #2e7d32; font-weight: bold; }
        footer { margin-top: 30px; color: #bbb; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>网站部署成功</h1>
        <p class="subtitle">这个页面由 Nginx 提供服务，展示了从零部署静态网站的完整流程</p>

        <div class="feature-list">
            <div class="feature-item">Gzip 压缩已开启</div>
            <div class="feature-item">静态资源缓存 30 天</div>
            <div class="feature-item">自定义 404 错误页面</div>
            <div class="feature-item">HTTPS 强制跳转</div>
            <div class="feature-item">JSON 格式访问日志</div>
        </div>

        <div class="status">
            Nginx 正在运行中 -- 状态: 正常
        </div>

        <footer>
            <p>Powered by Nginx | 学习教程综合实战</p>
        </footer>
    </div>
</body>
</html>

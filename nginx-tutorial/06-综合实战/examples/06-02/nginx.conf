# Nginx 反向代理 + 静态资源分离配置
# 配合 06-02-反向代理Node应用.md 使用
#
# 角色分工：
#   Nginx（前厅）：
#     - 直接处理 /static/ 路径的静态文件（快速、高效）
#     - 将其他所有请求代理到 Node.js（端口 3000）
#   Node.js（后厨）：
#     - 处理动态页面和 API 请求
#     - 不需要关心静态资源的服务

server {
    listen       80;
    server_name  myapp.test;

    # ---- 日志 ----
    access_log /var/log/nginx/myapp_access.log;
    error_log  /var/log/nginx/myapp_error.log  warn;

    # ---- Gzip 压缩 ----
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    root   /var/www/myapp;
    index  index.html;

    # ==========================================
    # 策略 1：静态资源 —— Nginx 直接处理（前厅自助）
    # ==========================================
    location /static/ {
        # Nginx 直接从磁盘读取文件返回，不经过 Node.js
        alias /var/www/myapp/static/;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Served-By "Nginx-Direct";   # 标记：由 Nginx 直接处理的
        access_log off;
    }

    # ==========================================
    # 策略 2：API 接口 —— 代理到 Node.js
    # ==========================================
    location /api/ {
        proxy_pass http://127.0.0.1:3000;

        # 传递真实客户端信息
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置（API 请求一般较快）
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;

        # 缓冲设置
        proxy_buffering off;           # API 实时数据不缓存响应体
        proxy_buffer_size  4k;

        # 添加标记头
        add_header X-Served-By "Nginx-Proxy";
    }

    # ==========================================
    # 策略 3：其他所有请求 —— 代理到 Node.js
    # 包括首页、动态页面等
    # ==========================================
    location / {
        proxy_pass http://127.0.0.1:3000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;    # 动态页面可能生成较慢
        proxy_send_timeout    10s;
    }

    # ==========================================
    # 健康检查端点（可选）
    # ==========================================
    location /nginx-health {
        access_log off;
        return 200 "Nginx is healthy\n";
    }
}

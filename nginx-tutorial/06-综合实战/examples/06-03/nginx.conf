# Nginx 负载均衡集群配置
# 配合 06-03-负载均衡集群实战.md 使用

http {
    # ==========================================
    # 上游服务器组：3 个 Node.js 实例
    # ==========================================
    upstream node_cluster {
        # least_conn：将请求分配给当前连接数最少的服务器
        # 适合处理时间不均匀的场景（有些请求快，有些慢）
        least_conn;

        # 后端实例列表（Docker 容器名或 IP:端口）
        server backend-3001:3001 weight=1 max_fails=2 fail_timeout=30s;
        server backend-3002:3002 weight=1 max_fails=2 fail_timeout=30s;
        server backend-3003:3003 weight=1 max_fails=2 fail_timeout=30s;

        # 不使用 Docker 时的配置：
        # server 127.0.0.1:3001 weight=1 max_fails=2 fail_timeout=30s;
        # server 127.0.0.1:3002 weight=1 max_fails=2 fail_timeout=30s;
        # server 127.0.0.1:3003 weight=1 max_fails=2 fail_timeout=30s;
    }

    server {
        listen       80;
        server_name  cluster.test;

        access_log /var/log/nginx/cluster_access.log;
        error_log  /var/log/nginx/cluster_error.log warn;

        location / {
            proxy_pass http://node_cluster;

            # 传递原始客户端信息
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 连接和后端超时设置
            proxy_connect_timeout   3s;
            proxy_read_timeout      10s;
            proxy_send_timeout      5s;

            # 当后端出错时的重试行为
            proxy_next_upstream error timeout http_500 http_502 http_503;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 10s;
        }

        # ==========================================
        # 健康检查端点（Nginx 自身，不含代理）
        # ==========================================
        location /nginx-status {
            access_log off;
            stub_status on;    # 需要 ngx_http_stub_status_module 模块
        }
    }
}

# 事件配置（Docker 环境推荐）
events {
    worker_connections 1024;
}

# ==========================================
# Nginx 负载均衡集群 - Docker Compose 编排
# 配合 06-03-负载均衡集群实战.md 使用
#
# 启动方式: docker-compose up -d
# 停止方式: docker-compose down
# ==========================================

version: '3.8'

services:
  # ---- Nginx 负载均衡器 ----
  nginx:
    image: nginx:alpine
    container_name: lb-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3
    networks:
      - app-network

  # ---- 后端实例 1 ----
  backend1:
    image: node:18-alpine
    container_name: backend-3001
    working_dir: /app
    volumes:
      - ./backend/server.js:/app/server.js:ro
    command: node server.js
    environment:
      - PORT=3001
      - INSTANCE_ID=node-3001
    networks:
      - app-network

  # ---- 后端实例 2 ----
  backend2:
    image: node:18-alpine
    container_name: backend-3002
    working_dir: /app
    volumes:
      - ./backend/server.js:/app/server.js:ro
    command: node server.js
    environment:
      - PORT=3002
      - INSTANCE_ID=node-3002
    networks:
      - app-network

  # ---- 后端实例 3 ----
  backend3:
    image: node:18-alpine
    container_name: backend-3003
    working_dir: /app
    volumes:
      - ./backend/server.js:/app/server.js:ro
    command: node server.js
    environment:
      - PORT=3003
      - INSTANCE_ID=node-3003
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

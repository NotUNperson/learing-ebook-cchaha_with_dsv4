# ==========================================
# HTTPS 全栈部署 - 生产级 Nginx 配置
# 配合 06-04-HTTPS全栈部署.md 使用
#
# 整合特性：
#   1. HTTPS (TLSv1.2/TLSv1.3) + HSTS
#   2. Gzip 压缩
#   3. 浏览器缓存（分类策略）
#   4. 反向代理 + 静态资源分离
#   5. 负载均衡 (least_conn) + 健康检查
#   6. 安全响应头
#   7. JSON 格式日志
#   8. 自定义错误页面
# ==========================================

http {
    # ==========================================
    # 全局 Gzip
    # ==========================================
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary       on;
    gzip_proxied    any;

    # ==========================================
    # 日志格式
    # ==========================================
    log_format json escape=json '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_response_time":"$upstream_response_time",'
        '"host":"$host",'
        '"scheme":"$scheme",'
        '"ssl_protocol":"$ssl_protocol"'
    '}';

    # ==========================================
    # 上游后端集群
    # ==========================================
    upstream backend_cluster {
        least_conn;
        server 127.0.0.1:3001 max_fails=2 fail_timeout=30s;
        server 127.0.0.1:3002 max_fails=2 fail_timeout=30s;
        # server 127.0.0.1:3003 max_fails=2 fail_timeout=30s;  # 按需扩展
    }

    # ==========================================
    # HTTP (80) -> 强制跳转 HTTPS
    # ==========================================
    server {
        listen       80;
        server_name  myapp.test;
        return 301 https://$server_name$request_uri;
    }

    # ==========================================
    # HTTPS (443) - 主站点
    # ==========================================
    server {
        listen       443 ssl http2;
        server_name  myapp.test;

        # ---- SSL 证书 ----
        ssl_certificate      certs/server.crt;
        ssl_certificate_key  certs/server.key;

        # ---- SSL 安全配置 ----
        ssl_protocols              TLSv1.2 TLSv1.3;
        ssl_ciphers                ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
        ssl_prefer_server_ciphers  on;
        ssl_session_cache          shared:SSL:10m;
        ssl_session_timeout        10m;
        ssl_session_tickets        off;        # 禁用 session ticket（增强前向保密）

        # ---- 安全响应头 ----
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ---- 日志 ----
        access_log /var/log/nginx/site_access.log json;
        error_log  /var/log/nginx/site_error.log  warn;

        # ---- 网站根目录 ----
        root   /var/www/myapp/site;
        index  index.html;

        # ==========================================
        # 1. 静态资源：Nginx 直接处理 + 分类缓存
        # ==========================================
        location ~* \.(css|js)$ {
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
        }
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }
        location ~* \.(woff|woff2|ttf|otf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ==========================================
        # 2. API：代理到后端集群
        # ==========================================
        location /api/ {
            proxy_pass http://backend_cluster;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout   5s;
            proxy_read_timeout      30s;
            proxy_send_timeout      10s;

            proxy_buffering off;

            # 后端错误时自动重试
            proxy_next_upstream error timeout http_500 http_502 http_503;
            proxy_next_upstream_tries 2;
        }

        # ==========================================
        # 3. 其他所有请求（首页等）
        # ==========================================
        location / {
            try_files $uri $uri/ =404;
        }

        # ==========================================
        # 4. 错误页面
        # ==========================================
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /var/www/myapp/site/errors;
            internal;
        }

        # ==========================================
        # 5. favicon / health（静默处理）
        # ==========================================
        location = /favicon.ico {
            access_log off;
            log_not_found off;
        }
    }
}

events {
    worker_connections 1024;
}

# Nginx 高级特性综合练习 - 全功能配置
# 配合 05-06-综合练习.md 使用
#
# 本配置整合了以下特性：
#   1. Gzip 压缩
#   2. 浏览器缓存（对不同文件类型设置不同策略）
#   3. 访问控制（管理后台加密码 + IP 白名单）
#   4. 限流（API 接口频率限制 + 连接数限制）
#   5. 自定义 JSON 格式日志

http {
    # ==========================================
    # 全局 Gzip 压缩配置
    # ==========================================
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary       on;
    gzip_proxied    any;

    # ==========================================
    # 限流区域定义
    # ==========================================
    limit_req_zone  $binary_remote_addr zone=api_limit:10m rate=5r/s;
    limit_req_zone  $binary_remote_addr zone=login_limit:10m rate=1r/s;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # ==========================================
    # 自定义日志格式
    # ==========================================
    log_format json escape=json '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"host":"$host"'
    '}';

    log_format detailed '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time';

    server {
        listen       80;
        server_name  localhost;

        # ---- 全局日志 ----
        access_log  /var/log/nginx/access.log  json;
        error_log   /var/log/nginx/error.log   warn;

        root   /usr/share/nginx/html;
        index  index.html;

        # ==========================================
        # 首页：协商缓存（每次验证是否有更新）
        # ==========================================
        location / {
            add_header Cache-Control "no-cache";
            try_files $uri $uri/ =404;
        }

        # ==========================================
        # 静态资源：Gzip + 长缓存
        # ==========================================
        location /static/ {
            access_log off;      # 静态资源不记日志，减少 I/O
        }

        # CSS 和 JS：缓存 7 天
        location ~* \.(css|js)$ {
            expires 7d;
            add_header Cache-Control "public";
        }

        # 图片：缓存 30 天
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
            expires 30d;
            add_header Cache-Control "public";
        }

        # 字体：缓存一年
        location ~* \.(woff|woff2|ttf|otf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ==========================================
        # 管理后台：IP 白名单 + HTTP Basic 认证
        # ==========================================
        location /admin/ {
            # IP 白名单：先允许，最后拒绝所有
            allow 127.0.0.1;
            allow 192.168.1.0/24;
            allow 10.0.0.0/8;
            deny  all;

            # HTTP Basic 认证
            auth_basic            "Admin Area - Authentication Required";
            auth_basic_user_file  /etc/nginx/htpasswd;

            # satisfy any = IP白名单 或 密码，满足任一即可
            satisfy any;
        }

        # ==========================================
        # API 接口：限流 + 独立日志
        # ==========================================
        location /api/ {
            # 请求频率限制：5r/s + burst=10
            limit_req zone=api_limit burst=10 nodelay;

            # 并发连接限制：每个 IP 最多 10 个
            limit_conn conn_per_ip 10;

            # 独立的详细日志
            access_log  /var/log/nginx/api_access.log  detailed;
            error_log   /var/log/nginx/api_error.log   info;
        }

        # ==========================================
        # 登录接口：严格限流（防止暴力破解）
        # ==========================================
        location /login/ {
            # 每秒 1 个请求，burst=3
            limit_req zone=login_limit burst=3 nodelay;
        }

        # ==========================================
        # 健康检查：不记日志
        # ==========================================
        location /health {
            access_log off;
            return 200 "healthy\n";
        }

        # ==========================================
        # favicon / robots.txt：静默处理
        # ==========================================
        location = /favicon.ico {
            access_log off;
            log_not_found off;
        }
        location = /robots.txt {
            access_log off;
            log_not_found off;
        }
    }
}

# Nginx 自定义日志格式配置示例
# 配合 05-05-日志自定义.md 使用

http {
    # ==========================================
    # 定义自定义日志格式
    # ==========================================

    # 格式一：详细分析格式（包含请求时间、处理时间、上游信息）
    log_format detailed '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time" '
                        'host="$host"';

    # 格式二：JSON 格式（方便日志分析工具解析，如 ELK、Splunk）
    log_format json escape=json '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_host":"$host",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"request_uri":"$request_uri",'
        '"request_method":"$request_method",'
        '"scheme":"$scheme",'
        '"ssl_protocol":"$ssl_protocol",'
        '"ssl_cipher":"$ssl_cipher"'
    '}';

    # 格式三：精简格式（只看关键信息）
    log_format minimal '$remote_addr $request $status $request_time';

    server {
        listen       80;
        server_name  localhost;

        root   /usr/share/nginx/html;
        index  index.html;

        # ==========================================
        # 全局：使用 JSON 格式日志（默认）
        # ==========================================
        access_log  /var/log/nginx/access.log  json;
        error_log   /var/log/nginx/error.log   warn;

        location / {
            try_files $uri $uri/ =404;
        }

        # ==========================================
        # API 接口：独立的日志文件 + 详细格式
        # 方便单独分析 API 的请求情况
        # ==========================================
        location /api/ {
            access_log  /var/log/nginx/api_access.log  detailed;
            error_log   /var/log/nginx/api_error.log   info;
        }

        # ==========================================
        # 静态资源：不记录日志（减少 I/O）
        # favicon.ico 和 robots.txt 的请求频率很高但没分析价值
        # ==========================================
        location /static/ {
            access_log off;
        }

        location = /favicon.ico {
            access_log off;
            log_not_found off;
        }

        location = /robots.txt {
            access_log off;
            log_not_found off;
        }

        # ==========================================
        # 健康检查端点：不记录日志
        # 负载均衡器的健康检查请求频繁且无分析价值
        # ==========================================
        location /health {
            access_log off;
            return 200 "OK";
        }
    }
}

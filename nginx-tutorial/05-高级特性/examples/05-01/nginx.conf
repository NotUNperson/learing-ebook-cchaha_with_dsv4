# Nginx Gzip 压缩配置示例
# 配合 05-01-Gzip压缩.md 使用

server {
    listen       80;
    server_name  localhost;

    root   examples/05-01/site;
    index  index.html;

    # ---- Gzip 压缩配置 ----

    # 1. 开启 Gzip（默认为 off）
    gzip  on;

    # 2. 指定要压缩的 MIME 类型
    #    只有这些类型才会被压缩，默认只压缩 text/html
    #    注意：text/html 始终在默认列表里，不需要显式指定
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        text/xml
        image/svg+xml;

    # 3. 最小压缩文件大小（字节）
    #    小于这个值的文件不压缩——因为压缩小文件的开销可能大于收益
    gzip_min_length  1000;

    # 4. 压缩级别 1-9
    #    1 = 最快但压缩率最低    9 = 最慢但压缩率最高
    #    6 是官方推荐的平衡点
    gzip_comp_level  6;

    # 5. 在响应头中添加 Vary: Accept-Encoding
    #    告诉缓存服务器（如 CDN）：请根据客户端的 Accept-Encoding
    #    来缓存不同版本（压缩版 vs 非压缩版）
    gzip_vary  on;

    # 6. 禁用对低版本 HTTP/1.0 的 Gzip（一般不需要改）
    gzip_http_version  1.1;

    # 7. 对代理请求也进行压缩
    gzip_proxied  any;

    # ---- 站点配置 ----
    location / {
        try_files $uri $uri/ =404;
    }

    # 静态资源：同样的 Gzip 配置自动继承
    location /static/ {
        # 额外针对静态资源的缓存优化（详见下一节的缓存教程）
        expires 7d;
    }
}

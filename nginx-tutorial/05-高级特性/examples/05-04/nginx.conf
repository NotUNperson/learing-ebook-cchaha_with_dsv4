# Nginx 限流配置示例
# 配合 05-04-限流.md 使用

# ---- 限流区域定义（放在 http 块中） ----

# 请求频率限制：基于客户端 IP，10MB 内存，每秒最多 10 个请求
limit_req_zone $binary_remote_addr zone=req_limit_per_ip:10m rate=10r/s;

# API 接口频率限制：基于客户端 IP，每秒最多 5 个请求
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

# 并发连接数限制：基于客户端 IP，10MB 内存，每个 IP 最多 10 个并发连接
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# 虚拟主机并发连接数限制：基于服务器名
limit_conn_zone $server_name zone=conn_per_server:10m;

# ---- 服务器配置 ----

server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # ==========================================
    # 全局：基本限流
    # ==========================================
    location / {
        # 请求频率限制：10 个请求/秒，burst=20 允许突增
        limit_req zone=req_limit_per_ip burst=20 nodelay;

        # 并发连接数限制：每个 IP 最多 10 个连接
        limit_conn conn_per_ip  10;
        limit_conn conn_per_server  100;

        try_files $uri $uri/ =404;
    }

    # ==========================================
    # 登录接口：更严格的限流（防止暴力破解）
    # ==========================================
    location /login/ {
        # 每秒 1 个请求，不允许突增
        # 超过就返回 503
        limit_req zone=req_limit_per_ip burst=3 nodelay;
    }

    # ==========================================
    # API 接口：单独的限流规则
    # ==========================================
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;
    }

    # ==========================================
    # 下载区：限制并发连接数（防止下载器占满带宽）
    # ==========================================
    location /download/ {
        # 每个 IP 最多 2 个并发的下载连接
        limit_conn conn_per_ip  2;

        # 带宽限制：每个连接限速 500KB/s
        # limit_rate 500k;
    }
}

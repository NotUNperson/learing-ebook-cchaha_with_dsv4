# Nginx 浏览器缓存控制配置示例
# 配合 05-02-浏览器缓存控制.md 使用

server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # ==========================================
    # 全局默认：不缓存（适合动态内容）
    # ==========================================
    location / {
        add_header Cache-Control "no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        try_files $uri $uri/ =404;
    }

    # ==========================================
    # 静态资源：长缓存（修改文件名来更新）
    # ==========================================
    # CSS 和 JS 文件 —— 缓存一年
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 图片文件 —— 缓存 30 天
    # 图片通常不经常改，用 ETag 做验证即可
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # 字体文件 —— 缓存一年
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ==========================================
    # HTML 页面：短缓存或协商缓存
    # HTML 通常需要及时更新，用 ETag/Last-Modified 验证即可
    # ==========================================
    location ~* \.html$ {
        # 不设置长过期时间，让浏览器每次验证 ETag
        add_header Cache-Control "no-cache";
    }

    # ==========================================
    # 版本化的静态文件：永久缓存
    # 文件名包含 hash 的资源：app.a3f2b1c.js -> 内容变了文件名就变
    # 适合 Webpack 等打包工具输出的带 hash 文件名
    # ==========================================
    location ~* \.[a-f0-9]{8,}\.(js|css|png|jpg|jpeg|gif|svg|woff2?)$ {
        expires max;
        add_header Cache-Control "public, immutable";
    }
}

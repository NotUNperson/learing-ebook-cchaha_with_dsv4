# Nginx 访问控制配置示例
# 配合 05-03-访问控制.md 使用

server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # ==========================================
    # 公共区域：无需认证
    # ==========================================
    location / {
        try_files $uri $uri/ =404;
    }

    # ==========================================
    # 管理后台：HTTP Basic 认证 + IP 白名单
    # ==========================================
    location /admin/ {

        # ---- IP 访问控制 ----
        # 先禁止所有 IP
        # deny  all;

        # 只允许公司内网 IP 访问
        # allow 192.168.1.0/24;
        # allow 10.0.0.0/8;

        # 也可以反过来：先允许再禁止
        # 下面示例：允许本地和公司 VPN，拒绝其他所有
        allow 127.0.0.1;
        allow 192.168.1.0/24;
        deny  all;   # 最后禁止所有其他 IP

        # ---- HTTP Basic 认证 ----
        auth_basic            "Admin Area - Please Login";
        auth_basic_user_file  /etc/nginx/htpasswd;

        # ---- satisfy：控制两种验证的关系 ----
        # satisfy any;   # 满足任一条件即可（IP白名单 或 密码）
        # satisfy all;   # 必须同时满足（IP白名单 且 密码）—— 默认值
        satisfy  any;

        # 配合反向代理的写法
        # try_files $uri $uri/ =404;
    }

    # ==========================================
    # API 接口：只允许内网 IP 访问
    # ==========================================
    location /api/ {
        allow  127.0.0.1;
        allow  10.0.0.0/8;
        allow  172.16.0.0/12;
        allow  192.168.0.0/16;
        deny   all;
    }
}

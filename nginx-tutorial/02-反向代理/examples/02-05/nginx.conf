# ==========================================
# 综合练习：留言板反向代理配置
# 前后端分离架构
# 测试前请修改 hosts 文件：
#   127.0.0.1  messageboard.local
# ==========================================

server {
    listen 80;
    server_name messageboard.local;

    # ---------- 静态前端（Nginx 直接提供）----------
    # 访问 / 返回 HTML 页面，/css/ /js/ 返回静态资源
    location / {
        root html/frontend;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # ---------- API 代理（转发到 Node.js 后端）----------
    # /api/messages -> http://localhost:3000/messages
    # /api/add      -> http://localhost:3000/add
    location /api/ {
        # 注意：尾部有 /，所以 /api/ 会被替换为 /
        proxy_pass http://localhost:3000/;

        # 传递客户端真实信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # 超时设置
        proxy_connect_timeout 5s;        # 连接后端，等 5 秒
        proxy_read_timeout 10s;          # 读取响应，等 10 秒
                                          # （慢接口 /slow 15 秒才返回，会触发超时）
        proxy_send_timeout 10s;

        # 缓冲（API 响应通常不大，默认缓冲即可）
        proxy_buffering on;
    }

    # ---------- 关闭不需要显示的 Nginx 版本号 ----------
    server_tokens off;
}

# 测试方法：
# 1. 启动后端：node backend/server.js
# 2. 将前端文件放到 html/frontend/ 目录
# 3. 修改 hosts：127.0.0.1 messageboard.local
# 4. 重载 nginx：nginx -s reload
# 5. 访问浏览器：http://messageboard.local/
# 6. curl 测试 API：curl http://messageboard.local/api/messages
# 7. 测试超时：curl http://messageboard.local/api/slow（预期 504）

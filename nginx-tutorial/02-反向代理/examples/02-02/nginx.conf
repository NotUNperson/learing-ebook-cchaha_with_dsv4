# ==========================================
# proxy_pass 基本配置示例
# 演示带路径和不带路径的差异
# ==========================================

server {
    listen 80;
    server_name api.local;

    # ---------- 情况一：proxy_pass 不带路径 ----------
    # 原始 URI 完整传递：/api/na/users -> http://localhost:3000/api/na/users
    location /api/na/ {
        proxy_pass http://localhost:3000;
    }

    # ---------- 情况二：proxy_pass 带根路径 / ----------
    # location 匹配的 /api/s/ 被替换为 /
    # /api/s/users -> http://localhost:3000/users
    location /api/s/ {
        proxy_pass http://localhost:3000/;
    }

    # ---------- 情况三：proxy_pass 带自定义路径 ----------
    # location 匹配的 /api/v2/ 被替换为 /custom/
    # /api/v2/users -> http://localhost:3000/custom/users
    location /api/v2/ {
        proxy_pass http://localhost:3000/custom/;
    }
}

# 测试方法：
# 1. 启动后端：node backend/app.js
# 2. 修改 hosts 文件：127.0.0.1 api.local
# 3. 重载 nginx：nginx -s reload
# 4. 测试：
#    curl http://api.local/api/na/users    -> url 是 /api/na/users
#    curl http://api.local/api/s/users     -> url 是 /users
#    curl http://api.local/api/v2/users    -> url 是 /custom/users

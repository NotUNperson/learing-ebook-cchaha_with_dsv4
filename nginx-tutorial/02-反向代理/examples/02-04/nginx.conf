# ==========================================
# 超时与重试配置示例
# 演示三种超时参数和 proxy_next_upstream
# ==========================================

server {
    listen 80;
    server_name api.local;

    # ---------- 普通 API 接口（短超时）----------
    location /api/ {
        proxy_pass http://localhost:3000/;

        # 请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 超时设置（普通 API 请求）
        proxy_connect_timeout 5s;      # 建立连接：5 秒
        proxy_read_timeout 30s;        # 读取响应：30 秒
        proxy_send_timeout 15s;        # 发送请求：15 秒

        # 失败重试（配合 upstream 使用）
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
    }

    # ---------- 快速接口（超短超时，用于测试超时效果）----------
    location /api-fast/ {
        proxy_pass http://localhost:3000/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 非常短的超时，方便观察超时行为
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;         # 只等 5 秒
        proxy_send_timeout 5s;
    }

    # ---------- 文件上传接口（长超时）----------
    location /upload/ {
        proxy_pass http://localhost:3000/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 长超时：适合大文件上传
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;       # 5 分钟
        proxy_send_timeout 300s;

        # 上传通常不重试（避免重复上传）
        proxy_next_upstream off;
    }
}

# 测试方法：
# 1. 启动后端：node backend/server.js
# 2. 访问慢接口测试超时：
#    curl http://api.local/api-fast/slow  (如果后端有 10 秒延迟的接口，
#    会因为 proxy_read_timeout=5s 而返回 504 Gateway Timeout)
# 3. 查看 nginx error.log 观察超时记录

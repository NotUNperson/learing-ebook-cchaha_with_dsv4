# ==========================================
# 请求头与缓冲配置示例
# 演示 proxy_set_header 和 proxy_buffering
# ==========================================

server {
    listen 80;
    server_name api.local;

    # ---------- 带完整请求头配置的代理 ----------
    location /api/ {
        proxy_pass http://localhost:3000/;

        # ---- 传递客户端真实信息 ----
        # 原始 Host 头（客户端访问的域名）
        proxy_set_header Host $host;

        # 客户端真实 IP（直接连接 Nginx 的 IP）
        proxy_set_header X-Real-IP $remote_addr;

        # 完整代理链（经过多层代理时不断追加）
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 客户端使用的协议（http 或 https）
        proxy_set_header X-Forwarded-Proto $scheme;

        # 关闭 Connection 头，由后端决定
        proxy_set_header Connection "";

        # ---- 缓冲设置 ----
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 16 32k;
        proxy_busy_buffers_size 64k;
    }

    # ---------- 对比：不带请求头设置的代理 ----------
    # 取消注释下面这段，然后注释掉上面的 /api/ 块，
    # 访问 http://api.local/api/users 对比前后端返回的 headers
    #
    # location /api-no-headers/ {
    #     proxy_pass http://localhost:3000/;
    #     # 不设置任何 proxy_set_header
    # }

    # ---------- 本地静态文件 ----------
    location / {
        root html;
        index index.html;
    }
}

# 测试方法：
# 1. 启动后端：node ../02-02/backend/app.js
# 2. 修改 hosts：127.0.0.1 api.local
# 3. 重载 nginx：nginx -s reload
# 4. 访问：curl http://api.local/api/users
# 5. 观察返回 JSON 中的 headers 字段：
#    - x-real-ip 应该是 127.0.0.1
#    - x-forwarded-for 应该是 127.0.0.1
#    - host 应该是 api.local
